openapi: 3.0.3
info:
  title: Account Service API
  version: 1.0.0
servers:
  - url: http://localhost:8082
paths:
  /api/v1/accounts:
    get:
      tags: [Accounts]
      operationId: getAccounts
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountResponse'
    post:
      tags: [Accounts]
      operationId: createAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '409':
          description: Duplicate account number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/accounts/{accountId}:
    get:
      tags: [Accounts]
      operationId: getAccountById
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Accounts]
      operationId: updateAccount
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountResponse'
    delete:
      tags: [Accounts]
      operationId: deleteAccount
      parameters:
        - name: accountId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: No content
  /api/v1/movements:
    get:
      tags: [Movements]
      operationId: getMovements
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovementResponse'
    post:
      tags: [Movements]
      operationId: createMovement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovementRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovementResponse'
        '422':
          description: Business error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/movements/{movementId}:
    get:
      tags: [Movements]
      operationId: getMovementById
      parameters:
        - name: movementId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovementResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/{customerId}:
    get:
      tags: [Reports]
      operationId: getCustomerReport
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerReportResponse'
components:
  schemas:
    AccountRequest:
      type: object
      required: [number, type, initialBalance, status, customerId]
      properties:
        number:
          type: string
          minLength: 3
          maxLength: 50
        type:
          type: string
          enum: [SAVINGS, CURRENT]
        initialBalance:
          type: number
          format: double
          minimum: 0
        status:
          type: boolean
        customerId:
          type: integer
          format: int64
    AccountResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        number:
          type: string
        type:
          type: string
          enum: [SAVINGS, CURRENT]
        initialBalance:
          type: number
          format: double
        currentBalance:
          type: number
          format: double
        status:
          type: boolean
        customerId:
          type: integer
          format: int64
    MovementRequest:
      type: object
      required: [accountId, type, value]
      properties:
        accountId:
          type: integer
          format: int64
        type:
          type: string
          enum: [CREDIT, DEBIT]
        value:
          type: number
          format: double
          exclusiveMinimum: 0
    MovementResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        accountId:
          type: integer
          format: int64
        date:
          type: string
          format: date-time
        type:
          type: string
          enum: [CREDIT, DEBIT]
        value:
          type: number
          format: double
        balance:
          type: number
          format: double
    CustomerReportResponse:
      type: object
      properties:
        customerId:
          type: integer
          format: int64
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountReportItem'
    AccountReportItem:
      type: object
      properties:
        accountId:
          type: integer
          format: int64
        number:
          type: string
        type:
          type: string
        initialBalance:
          type: number
          format: double
        currentBalance:
          type: number
          format: double
        movements:
          type: array
          items:
            $ref: '#/components/schemas/MovementResponse'
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string